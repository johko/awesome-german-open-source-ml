name: Update Activity Indicators

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:      # Allow manual trigger to populate initial values

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update activity indicators
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python .github/scripts/update_activity.py README.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: 'chore: update repository activity indicators'
          title: 'chore: update repository activity indicators'
          body: 'Automated weekly update of 🟢🟡🔴 activity indicators based on last commit date.'
          branch: chore/update-activity-indicators
          delete-branch: true
